apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-api-deployment
  labels:
    app: eks-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-api
  template:
    metadata:
      labels:
        app: eks-api
    spec:
      containers:
      - name: flask-api
        image: 216141407996.dkr.ecr.ap-south-1.amazonaws.com/eks-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        
        # Resource constraints to keep the container slim
        resources:
          limits:
            cpu: "250m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"

        # Liveness Probe: Checks if the app crashed/locked up and restarts it if necessary
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

        # Readiness Probe: Checks if the app is fully initialized and ready to take web traffic
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5