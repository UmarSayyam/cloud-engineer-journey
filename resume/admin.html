<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Portfolio Visitors</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060d1a;color:#e2e8f0;font-family:'DM Mono',monospace;padding:40px;min-height:100vh}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;color:#38bdf8;margin-bottom:8px}
.subtitle{color:#64748b;font-size:.8rem;margin-bottom:40px}
.stats{display:flex;gap:24px;margin-bottom:40px}
.stat{background:#0c1a2e;border:1px solid #1e3a5f;border-radius:8px;padding:20px 28px}
.stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#38bdf8}
.stat-label{font-size:.72rem;color:#64748b;margin-top:4px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.72rem;color:#64748b;padding:12px 16px;border-bottom:1px solid #1e3a5f;letter-spacing:.05em}
td{padding:14px 16px;border-bottom:1px solid rgba(30,58,95,.4);font-size:.8rem}
tr:hover td{background:rgba(56,189,248,.03)}
.device-badge{padding:3px 10px;border-radius:3px;font-size:.7rem;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);color:#7dd3fc}
.visits{color:#34d399;font-weight:500}
.ip{color:#94a3b8}
.time{color:#64748b;font-size:.72rem}
.loading{color:#64748b;text-align:center;padding:60px}
</style>
</head>
<body>
<h1>// visitor dashboard</h1>
<p class="subtitle">private admin panel — portfolio analytics</p>
<div class="stats">
  <div class="stat">
    <div class="stat-num" id="total-visitors">—</div>
    <div class="stat-label">unique visitors</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="total-visits">—</div>
    <div class="stat-label">total visits</div>
  </div>
</div>
<table>
  <thead>
    <tr>
      <th>IP ADDRESS</th>
      <th>DEVICE</th>
      <th>BROWSER</th>
      <th>VISITS</th>
      <th>LAST SEEN</th>
    </tr>
  </thead>
  <tbody id="visitors-table">
    <tr><td colspan="5" class="loading">loading visitors...</td></tr>
  </tbody>
</table>
<script>
fetch('https://xy2hlg5ym5.execute-api.ap-south-1.amazonaws.com/prod/admin')
  .then(r => r.json())
  .then(data => {
    const visitors = data.visitors;
    document.getElementById('total-visitors').textContent = visitors.length;
    const totalVisits = visitors.reduce((sum, v) => sum + v.visit_count, 0);
    document.getElementById('total-visits').textContent = totalVisits;
    const tbody = document.getElementById('visitors-table');
    tbody.innerHTML = visitors.map(v => `
      <tr>
        <td class="ip">${v.ip}</td>
        <td><span class="device-badge">${v.device}</span></td>
        <td>${v.browser}</td>
        <td class="visits">${v.visit_count}</td>
        <td class="time">${v.last_visit}</td>
      </tr>
    `).join('');
  })
  .catch(e => {
    document.getElementById('visitors-table').innerHTML = '<tr><td colspan="5" class="loading">error loading data</td></tr>';
  });
</script>
</body>
</html>
